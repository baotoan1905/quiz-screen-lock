name: Prod Release
on:
  push:
    branches: [main]
jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Get next version
        id: version
        shell: bash
        run: |
          latest=$(git tag -l 'v*' --sort=-v:refname | head -n 1)
          if [ -z "$latest" ]; then
            echo "tag=v1.0.0" >> $GITHUB_OUTPUT
          else
            IFS='.' read -r major minor patch <<< "${latest#v}"
            echo "tag=v$major.$minor.$((patch+1))" >> $GITHUB_OUTPUT
          fi
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Build exe
        run: pyinstaller --onefile --windowed --name QuizLock src/main.py
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: QuizLock ${{ steps.version.outputs.tag }}
          files: dist/QuizLock.exe
          generate_release_notes: true
